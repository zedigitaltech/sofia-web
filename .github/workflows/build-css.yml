name: Build CSS

on:
  push:
    branches: [main]
    paths:
      - '**.html'
      - 'main.js'
      - 'input.css'
      - 'tailwind.config.js'
      - 'package.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build:css

      - name: Commit rebuilt CSS if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add styles-tailwind.css
          git diff --staged --quiet || git commit -m "chore: rebuild Tailwind CSS [skip ci]"
          git push
